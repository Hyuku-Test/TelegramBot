name: Run Python Script Cloud

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-telegram-bot aiohttp requests

    - name: Execute Python Script
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        MY_SECRET_URL: ${{ secrets.MY_SECRET_URL }}
        MY_SECRET_APPSCRIPTS: ${{ secrets.MY_SECRET_APPSCRIPTS }}
      run: python bot_internal.py
